<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D'Royal Spa Home</title>
  <style>
    :root {
      --bg: #050505;
      --bg-soft: #0e0d0c;
      --gold: #d8bf9a;
      --gold-2: #b79a72;
      --text: #f4ede4;
      --muted: rgba(244, 237, 228, 0.78);
      --line: rgba(255,255,255,0.12);
      --panel: rgba(12,12,12,0.92);
      --panel-2: rgba(17,17,17,0.96);
      --btn: #060606;
      --cream: #ece1d4;
      --shadow: 0 18px 60px rgba(0,0,0,.45);
      --radius: 24px;
      --side-pad: 16px;
      --hero-h: 100svh;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 34%),
        linear-gradient(180deg, #090909 0%, #000 100%);
    }

    a { color: inherit; text-decoration: none; }

    .app-shell {
      width: 100%;
      min-height: 100svh;
      position: relative;
      isolation: isolate;
    }

    .hero {
      position: relative;
      min-height: var(--hero-h);
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(0,0,0,.20) 0%, rgba(0,0,0,.26) 35%, rgba(0,0,0,.62) 70%, rgba(0,0,0,.94) 100%),
        url('https://images.squarespace-cdn.com/content/v1/65e0b0203d824e56691e609a/ec28aa8a-30c9-41f5-ab4e-d369944b68b8/106.jpg') center center / cover no-repeat;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 15%, rgba(255,255,255,0.14), transparent 26%);
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .hero-topbar {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 18px var(--side-pad) 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,.92);
    }

    .hero-topbar .small-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      opacity: .95;
    }

    .hero-copy {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 36px 24px 0;
      max-width: 980px;
      margin: 0 auto;
    }

    .brand {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 500;
      letter-spacing: .02em;
      color: var(--gold);
    }

    .headline {
      margin: 0;
      font-size: clamp(48px, 8vw, 88px);
      line-height: .95;
      font-weight: 500;
      color: #fffaf3;
      text-wrap: balance;
    }

    .subline {
      margin: 14px auto 0;
      font-family: Arial, Helvetica, sans-serif;
      text-transform: uppercase;
      letter-spacing: .28em;
      font-size: 13px;
      color: rgba(255,255,255,.86);
    }

    .areas {
      position: relative;
      z-index: 2;
      margin: min(38vh, 360px) auto 0;
      padding: 0 var(--side-pad);
      text-align: center;
      font-size: clamp(18px, 2.5vw, 30px);
      color: rgba(245,236,228,.92);
    }

    .contact-inline {
      position: relative;
      z-index: 2;
      padding: 12px var(--side-pad) 0;
      display: grid;
      gap: 10px;
      justify-items: center;
      font-family: Arial, Helvetica, sans-serif;
    }

    .phone-link {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: rgba(12,12,12,.46);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 999px;
      padding: 12px 22px;
      box-shadow: var(--shadow);
      font-size: clamp(18px, 3vw, 28px);
      font-weight: 700;
      color: #fffaf3;
    }

    .mail {
      font-size: 14px;
      color: rgba(255,255,255,.78);
    }

    .offer-mini {
      position: relative;
      z-index: 2;
      margin: 18px auto 0;
      width: min(440px, calc(100% - 32px));
      display: grid;
      grid-template-columns: auto 1fr;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(246, 237, 224, .12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      font-family: Arial, Helvetica, sans-serif;
    }

    .offer-mini .badge {
      background: rgba(216,191,154,.18);
      color: #fff2df;
      font-weight: 700;
      padding: 12px 16px;
      font-size: 15px;
      white-space: nowrap;
    }

    .offer-mini .text {
      padding: 12px 16px;
      font-size: 14px;
      color: rgba(255,255,255,.92);
    }

    .calendar-toggle {
      position: relative;
      z-index: 2;
      margin: 14px auto 0;
      width: min(440px, calc(100% - 32px));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 15px 18px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      font-size: 15px;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      cursor: pointer;
    }

    .calendar-panel {
      position: relative;
      z-index: 2;
      width: min(900px, calc(100% - 24px));
      margin: 10px auto 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height .45s ease;
    }

    .calendar-panel.open { max-height: 1000px; }

    .calendar-wrap {
      margin-top: 8px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(12px);
    }

    .calendar-wrap iframe {
      width: 100%;
      min-height: 720px;
      border: 0;
      background: #fff;
      display: block;
    }

    .strips-anchor {
      position: relative;
      z-index: 3;
      margin-top: 18px;
      padding-bottom: 16px;
    }

    .strips {
      width: 100%;
      display: grid;
      gap: 6px;
    }

    .strip-btn {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
      width: calc(100% - 0px);
      min-height: 66px;
      padding: 0 18px;
      border: 0;
      border-radius: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.98), rgba(10,10,10,.98));
      color: #fff;
      border-top: 1px solid rgba(255,255,255,.12);
      border-bottom: 1px solid rgba(255,255,255,.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.02);
      cursor: pointer;
      text-align: left;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(20px, 3vw, 30px);
      letter-spacing: .01em;
    }

    .strip-btn .chev {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 28px;
      opacity: .9;
    }

    .strip-btn.active {
      background: linear-gradient(180deg, #121212, #000);
      color: #f6eadc;
    }

    .pages {
      position: relative;
      background: #000;
    }

    .page {
      position: sticky;
      top: 0;
      min-height: 100svh;
      width: 100%;
      padding: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.92) 0%, rgba(10,10,10,.98) 100%);
      border-top: 1px solid rgba(255,255,255,.08);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      overflow: hidden;
    }

    .page-top-strip,
    .page-bottom-strip {
      display: grid;
      gap: 6px;
      background: rgba(0,0,0,.98);
    }

    .page-top-strip { padding-top: 0; }
    .page-bottom-strip { padding-bottom: 10px; }

    .page-open-name {
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      background: #000;
      border-top: 1px solid rgba(255,255,255,.12);
      border-bottom: 1px solid rgba(255,255,255,.12);
      color: #fff;
      font-size: clamp(22px, 3vw, 32px);
    }

    .page-inner {
      padding: 0;
      display: grid;
      grid-template-rows: minmax(260px, 40svh) auto auto auto;
      background: linear-gradient(180deg, rgba(244,233,220,.08), transparent 40%), #050505;
    }

    .page-hero {
      position: relative;
      overflow: hidden;
      background-size: cover;
      background-position: center;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .page-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.18) 0%, rgba(0,0,0,.36) 50%, rgba(0,0,0,.72) 100%);
    }

    .page-copy {
      position: relative;
      z-index: 1;
      padding: 28px var(--side-pad) 20px;
      text-align: center;
      background: linear-gradient(180deg, rgba(0,0,0,.82), rgba(0,0,0,.94));
    }

    .page-copy h2 {
      margin: 0 0 10px;
      font-size: clamp(40px, 7vw, 62px);
      line-height: .98;
      color: #fffaf2;
      font-weight: 500;
    }

    .page-copy p {
      margin: 0 auto;
      max-width: 860px;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--muted);
      font-size: clamp(17px, 2.5vw, 24px);
      line-height: 1.55;
    }

    .bubble-row {
      padding: 18px var(--side-pad) 4px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      background: #060606;
    }

    .bubble {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.1);
      color: #f3e8da;
      padding: 11px 16px;
      border-radius: 999px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 15px;
      line-height: 1;
      white-space: nowrap;
    }

    .before-after {
      padding: 16px var(--side-pad) 8px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      background: #050505;
    }

    .ba-col {
      background: #111;
      border: 1px solid rgba(255,255,255,.1);
      overflow: hidden;
    }

    .ba-label {
      background: #000;
      color: #f4eadf;
      text-align: center;
      padding: 10px 8px;
      font-size: 14px;
      letter-spacing: .08em;
      font-family: Arial, Helvetica, sans-serif;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .ba-col img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
    }

    .page-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 14px var(--side-pad) 14px;
      background: #050505;
    }

    .action-btn {
      min-height: 56px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 17px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,.12);
    }

    .action-btn.light {
      background: transparent;
      color: #fff;
    }

    .action-btn.gold {
      background: var(--cream);
      color: #111;
      border-color: transparent;
    }

    .page-footnote {
      text-align: center;
      padding: 0 20px 10px;
      font-family: Arial, Helvetica, sans-serif;
      color: rgba(255,255,255,.66);
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    @media (max-width: 700px) {
      .hero-topbar {
        font-size: 11px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .headline { font-size: 54px; }
      .areas { font-size: 15px; margin-top: min(32vh, 260px); }
      .phone-link { font-size: 16px; }
      .offer-mini, .calendar-toggle { width: calc(100% - 20px); }
      .strip-btn, .page-open-name { font-size: 18px; min-height: 60px; }
      .page-copy h2 { font-size: 36px; }
      .page-copy p { font-size: 16px; }
      .before-after { grid-template-columns: 1fr 1fr; }
      .ba-col img { height: 180px; }
      .action-btn { font-size: 15px; }
    }
  </style>
</head>

        before: 'https://images.squarespace-cdn.com/content/v1/65e0b0203d824e56691e609a/a14800f1-f552-49fd-b02f-02ef3174c724/Your%2Bparagraph%2Btext-38.jpg',
        after: 'https://images.squarespace-cdn.com/content/v1/65e0b0203d824e56691e609a/a14800f1-f552-49fd-b02f-02ef3174c724/Your%2Bparagraph%2Btext-38.jpg',
        summaryEs: 'Ayuda a reducir volumen y mejorar definición en brazos para un look más limpio y estilizado.',
        summaryEn: 'Helps reduce bulk and improve arm definition for a slimmer, more refined look.',
        bubblesEs: ['Brazos', 'Definición', 'Firmeza', 'Moldeo'],
        bubblesEn: ['Arms', 'Definition', 'Firmness', 'Sculpting'],
        learn: 'https://droyalspa.com/reduccion-de-brazos',
        book: 'https://DRoyalSpaMiami.as.me/?appointmentType=91873037'
      },
      {
        slug: 'piernas',
        nameEs: 'LipoEscultura de Piernas 360',
        nameEn: 'Leg Sculpting 360',
        hero: 'https://images.squarespace-cdn.com/content/v1/65e0b0203d824e56691e609a/827ca5a1-cb08-4075-9a61-d53ba6820cc7/113.jpg',
        before: 'https://images.squarespace-cdn.com/content/v1/65e0b0203d824e56691e609a/827ca5a1-cb08-4075-9a61-d53ba6820cc7/113.jpg',
        after: 'https://images.squarespace-cdn.com/content/v1/65e0b0203d824e56691e609a/827ca5a1-cb08-4075-9a61-d53ba6820cc7/113.jpg',
        summaryEs: 'Ayuda a estilizar piernas y mejorar su apariencia general para una silueta más lisa y definida.',
        summaryEn: 'Helps refine the legs and improve their overall appearance for a smoother, more sculpted silhouette.',
        bubblesEs: ['Piernas', 'Celulitis', 'Liso visual', 'Definición'],
        bubblesEn: ['Legs', 'Cellulite', 'Smoother look', 'Definition'],
        learn: 'https://droyalspa.com/1-reduccion-de-celulitis-en-piernas',
        book: 'https://DRoyalSpaMiami.as.me/?appointmentType=91873056'
      }
    ];

    const isSpanish = (navigator.language || '').toLowerCase().startsWith('es');
    const t = {
      headline: isSpanish ? 'Lipo sin cirugía' : 'Surgery-Free Lipo',
      subline: isSpanish ? 'Sin agujas · Sin dolor' : 'No needles · No pain',
      offer: isSpanish ? 'Primera sesión limitada' : 'Limited first session',
      calendarToggle: isSpanish ? 'Ver agenda rápida' : 'Quick booking calendar',
      selectTreatment: isSpanish ? 'Selecciona tu tratamiento' : 'Choose your treatment',
      learnMore: isSpanish ? 'Aprender más' : 'Learn more',
      bookNow: isSpanish ? 'Agendar cita' : 'Book now',
      before: isSpanish ? 'Antes' : 'Before',
      after: isSpanish ? 'Después' : 'After'
    };

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (t[key]) el.textContent = t[key];
    });

    const heroStrips = document.getElementById('heroStrips');
    const pages = document.getElementById('pages');

    function stripTemplate(item, active = false, href = '#') {
      return `<a class="strip-btn ${active ? 'active' : ''}" href="${href}"><span>${isSpanish ? item.nameEs : item.nameEn}</span><span class="chev">›</span></a>`;
    }

    heroStrips.innerHTML = treatments.map(item => stripTemplate(item, false, `#page-${item.slug}`)).join('');

    pages.innerHTML = treatments.map((item, index) => {
      const prev = treatments[index - 1];
      const next = treatments[index + 1];
      return `
        <section class="page" id="page-${item.slug}">
          <div class="page-top-strip">
            <div class="page-open-name"><span>${isSpanish ? item.nameEs : item.nameEn}</span><span>≡</span></div>
            ${prev ? stripTemplate(prev, false, `#page-${prev.slug}`) : ''}
          </div>

          <div class="page-inner">
            <div class="page-hero" style="background-image:url('${item.hero}')"></div>

            <div class="page-copy">
              <h2>${isSpanish ? item.nameEs : item.nameEn}</h2>
              <p>${isSpanish ? item.summaryEs : item.summaryEn}</p>
            </div>

            <div class="bubble-row">
              ${(isSpanish ? item.bubblesEs : item.bubblesEn).map(b => `<span class="bubble">${b}</span>`).join('')}
            </div>

            <div>
              <div class="before-after">
                <div class="ba-col">
                  <div class="ba-label">${t.before}</div>
                  <img src="${item.before}" alt="${t.before} ${isSpanish ? item.nameEs : item.nameEn}">
                </div>
                <div class="ba-col">
                  <div class="ba-label">${t.after}</div>
                  <img src="${item.after}" alt="${t.after} ${isSpanish ? item.nameEs : item.nameEn}">
                </div>
              </div>

              <div class="page-actions">
                <a class="action-btn light" href="${item.learn}" target="_blank" rel="noopener">${t.learnMore}</a>
                <a class="action-btn gold" href="${item.book}" target="_blank" rel="noopener">${t.bookNow}</a>
              </div>

              <div class="page-footnote">D’Royal Spa · Miami</div>
            </div>
          </div>

          <div class="page-bottom-strip">
            ${next ? stripTemplate(next, false, `#page-${next.slug}`) : ''}
            ${treatments[index + 2] ? stripTemplate(treatments[index + 2], false, `#page-${treatments[index + 2].slug}`) : ''}
          </div>
        </section>
      `;
    }).join('');

    const toggle = document.getElementById('calendarToggle');
    const panel = document.getElementById('calendarPanel');
    toggle.addEventListener('click', () => {
      panel.classList.toggle('open');
      toggle.querySelector('span:last-child').textContent = panel.classList.contains('open') ? '−' : '+';
    });
  </script>
</body>
</html>
