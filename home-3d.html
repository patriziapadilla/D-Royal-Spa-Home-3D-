<html lang="es">
<head>
  <meta charset="UTF-8" />

  <title>D'Royal Spa · Home 3D</title>
  <style>
    :root{
      --bg:#060606;
      --bg2:#0f0d0b;
      --panel:#111111;
      --panel2:#171514;
      --line:rgba(255,255,255,.09);
      --gold:#dcc2a2;
      --gold2:#b69772;
      --cream:#efe3d5;
      --text:#f7efe6;
      --muted:rgba(247,239,230,.78);
      --shadow:0 20px 70px rgba(0,0,0,.45);
      --side:18px;
      --heroH:100svh;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#000;color:var(--text);font-family:Georgia,"Times New Roman",serif;scroll-behavior:smooth;overflow-x:hidden}
    body{background:radial-gradient(circle at top, rgba(255,255,255,.08), transparent 24%), linear-gradient(180deg,#0b0b0b 0%,#000 100%)}
    a{text-decoration:none;color:inherit}
    img{display:block;max-width:100%}

    .desktop-frame{width:min(1440px,100%);margin:0 auto;min-height:100svh;background:#000;box-shadow:0 0 0 1px rgba(255,255,255,.02)}

    /* HERO */
    .hero{
      min-height:var(--heroH);
      position:relative;
      overflow:hidden;
      background:
        linear-gradient(180deg,rgba(0,0,0,.10) 0%,rgba(0,0,0,.18) 30%,rgba(0,0,0,.44) 62%,rgba(0,0,0,.92) 100%),
        url('https://images.squarespace-cdn.com/content/v1/65e0b0203d824e56691e609a/ec28aa8a-30c9-41f5-ab4e-d369944b68b8/106.jpg') center center/cover no-repeat;
    }
    .hero:before{
      content:"";position:absolute;inset:0;
      background:radial-gradient(circle at 50% 16%, rgba(255,255,255,.14), transparent 22%);
      pointer-events:none;
    }
    .hero-inner{position:relative;z-index:2;min-height:var(--heroH);display:flex;flex-direction:column}
    .topline{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:16px var(--side) 0;font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#fff;opacity:.95}
    .topline a{display:inline-flex;align-items:center;gap:8px}

    .hero-copy{padding:32px var(--side) 0;text-align:center;max-width:1100px;margin:0 auto}
    .brand{margin:0 0 8px;font-size:clamp(28px,3vw,42px);font-weight:500;color:var(--gold);letter-spacing:.02em}
    .headline{margin:0;font-size:clamp(58px,8vw,108px);line-height:.93;font-weight:500;color:#fff8ef}
    .subline{margin:12px 0 0;font-family:Arial,Helvetica,sans-serif;font-size:13px;letter-spacing:.30em;text-transform:uppercase;color:rgba(255,255,255,.86)}
    .areas{margin-top:auto;padding:0 var(--side) 0;text-align:center;font-size:clamp(19px,2.1vw,31px);color:#f5ece1}
    .hero-contact{padding:14px var(--side) 0;display:grid;justify-items:center;gap:8px;font-family:Arial,Helvetica,sans-serif}
    .phone-pill{display:inline-flex;align-items:center;gap:12px;padding:12px 24px;border-radius:999px;background:rgba(10,10,10,.52);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:var(--shadow);font-size:clamp(18px,2vw,28px);font-weight:700;color:#fff}
    .email-line{font-size:14px;color:rgba(255,255,255,.80)}
    .offer-line{margin:14px auto 0;display:inline-flex;align-items:center;gap:14px;padding:10px 14px;border-radius:999px;background:rgba(250,238,223,.10);border:1px solid rgba(255,255,255,.10);font-family:Arial,Helvetica,sans-serif;font-size:14px}
    .offer-line b{display:inline-block;padding:7px 12px;border-radius:999px;background:rgba(220,194,162,.20);color:#fff4e7}

    .hero-bottom{padding:18px 0 10px;margin-top:18px}
    .hero-label{padding:0 var(--side) 10px;text-align:center;font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-family:Arial,Helvetica,sans-serif;color:rgba(255,255,255,.70)}

    /* STRIPS */
    .strips,.mini-strips{display:grid;gap:6px}
    .strip{
      min-height:68px;
      width:100%;
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      gap:14px;
      padding:0 var(--side);
      background:linear-gradient(180deg,#050505,#0c0c0c);
      border-top:1px solid rgba(255,255,255,.11);
      border-bottom:1px solid rgba(255,255,255,.11);
      color:#fff9f1;
      font-size:clamp(22px,2.4vw,34px);
      letter-spacing:.01em;
    }
    .strip .arrow{font-family:Arial,Helvetica,sans-serif;font-size:28px;opacity:.9}
    .mini-strip{
      min-height:60px;
      width:100%;
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      gap:10px;
      padding:0 var(--side);
      background:linear-gradient(180deg,#050505,#0a0a0a);
      border-top:1px solid rgba(255,255,255,.09);
      border-bottom:1px solid rgba(255,255,255,.09);
      color:#fff7ef;
      font-size:clamp(18px,1.8vw,28px);
    }
    .mini-strip .arrow{font-family:Arial,Helvetica,sans-serif;font-size:24px;opacity:.85}

    /* PAGES */
    .pages{background:#000}
    .page{position:sticky;top:0;min-height:100svh;background:#000;border-top:1px solid rgba(255,255,255,.08);display:grid;grid-template-rows:auto 1fr auto}
    .page-top,.page-bottom{display:grid;gap:6px;background:#000;position:relative;z-index:3}
    .page-title-strip{min-height:72px;display:grid;grid-template-columns:1fr auto;align-items:center;padding:0 var(--side);background:#000;border-top:1px solid rgba(255,255,255,.12);border-bottom:1px solid rgba(255,255,255,.12);font-size:clamp(24px,2.5vw,38px)}
    .page-title-strip .menu{font-family:Arial,Helvetica,sans-serif;font-size:28px}

    .page-stage{display:grid;grid-template-columns:1.06fr .94fr;min-height:0;background:linear-gradient(180deg,#050505 0%,#0b0b0b 100%)}
    .page-visual{position:relative;min-height:540px;background:#111;overflow:hidden}
    .page-visual img{width:100%;height:100%;object-fit:cover}
    .page-visual:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.10),rgba(0,0,0,.48) 70%,rgba(0,0,0,.74))}

    .page-content{display:flex;flex-direction:column;justify-content:flex-start;padding:34px var(--side) 20px;background:#000}
    .page-content h2{margin:0 0 12px;font-size:clamp(46px,5.3vw,78px);line-height:.95;font-weight:500;color:#fff8ef}
    .page-content p{margin:0;color:var(--muted);font-family:Arial,Helvetica,sans-serif;font-size:clamp(18px,1.6vw,25px);line-height:1.52;max-width:820px}

    .bubbles{display:flex;flex-wrap:wrap;gap:10px;margin:22px 0 24px}
    .bubble{padding:11px 16px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.10);font-family:Arial,Helvetica,sans-serif;font-size:15px;color:#f4eadf}

    .beforeafter{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
    .ba{background:#0c0c0c;border:1px solid rgba(255,255,255,.10);overflow:hidden}
    .ba .lab{background:#000;color:#f3e8da;text-align:center;padding:10px 8px;font-size:13px;letter-spacing:.12em;text-transform:uppercase;font-family:Arial,Helvetica,sans-serif;border-bottom:1px solid rgba(255,255,255,.08)}
    .ba img{width:100%;height:260px;object-fit:cover}

    .page-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
    .btn{min-height:58px;display:flex;align-items:center;justify-content:center;border-radius:999px;font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:700;border:1px solid rgba(255,255,255,.12)}
    .btn.light{background:transparent;color:#fff}
    .btn.gold{background:var(--cream);color:#111;border-color:transparent}
    .foot{margin-top:14px;text-align:center;font-family:Arial,Helvetica,sans-serif;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.58)}

    /* sticky feel on desktop */
    @media (min-width: 981px){
      .pages{scroll-snap-type:y proximity}
      .page{scroll-snap-align:start}
    }

    /* tablet/mobile */
    @media (max-width: 980px){
      .topline{font-size:11px;justify-content:center;flex-wrap:wrap}
      .headline{font-size:56px}
      .areas{font-size:16px;margin-top:auto}
      .phone-pill{font-size:17px}
      .page{min-height:100svh}
      .page-stage{grid-template-columns:1fr;grid-template-rows:minmax(260px,38svh) auto}
      .page-visual{min-height:280px}
      .page-content{padding:24px var(--side) 16px}
      .page-content h2{font-size:42px}
      .page-content p{font-size:16px}
      .beforeafter{grid-template-columns:1fr 1fr}
      .ba img{height:170px}
      .strip{font-size:20px;min-height:62px}
      .mini-strip{font-size:17px;min-height:56px}
      .page-title-strip{font-size:22px;min-height:62px}
      .btn{font-size:16px;min-height:54px}
    }
  </style>
</head>

                <a class="btn light" href="${item.learn}" target="_blank" rel="noopener">${T.learn}</a>
                <a class="btn gold" href="${item.book}" target="_blank" rel="noopener">${T.book}</a>
              </div>

              <div class="foot">D’ROYAL SPA · MIAMI</div>
            </div>
          </div>

          <div class="page-bottom">
            ${next ? strip(next,'mini-strip') : ''}
            ${next2 ? strip(next2,'mini-strip') : ''}
          </div>
        </section>
      `;
    }).join('');
  </script>
</body>
