<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D'Royal Spa - Home 3D</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:black;
  color:white;
  overflow-x:hidden;
}

/* HERO */
.hero{
  height:100vh;
  background:url('https://images.unsplash.com/photo-1608248597279-f99d160bfcbc') center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.hero h1{
  font-size:40px;
  margin:10px 0;
}

.hero p{
  opacity:.8;
}

.phone{
  margin-top:15px;
  padding:12px 20px;
  border-radius:30px;
  background:#333;
  display:inline-block;
}

/* LISTA BOTONES */
.menu{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:black;
}

.menu button{
  width:100%;
  padding:18px;
  border:none;
  border-top:1px solid #333;
  background:black;
  color:white;
  text-align:left;
  font-size:18px;
}

/* PÁGINAS */
.section{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.section img{
  width:90%;
  border-radius:20px;
  margin:10px 0;
}

.btns{
  margin-top:15px;
}

.btns a{
  padding:10px 20px;
  margin:5px;
  background:white;
  color:black;
  border-radius:20px;
  text-decoration:none;
}
</style>

</head>

<body>

<div class="hero">
  <h1 id="title">Lipo sin cirugía</h1>
  <p id="sub">Sin agujas · Sin dolor</p>
  <div class="phone">786 690 0960</div>
</div>

<div id="content"></div>

<div class="menu" id="menu"></div>

<script>
const isES = navigator.language.startsWith("es");

const treatments = [
  {
    nameES:"Lipo Laser 360",
    nameEN:"Lipo Laser 360",
    img:"https://images.unsplash.com/photo-1594824475317-cc4c78c6c54f"
  },
  {
    nameES:"Lipo Laser 360 con Transfer",
    nameEN:"Lipo Laser 360 with Transfer",
    img:"https://images.unsplash.com/photo-1588776814546-ec7c6b1dc5db"
  },
  {
    nameES:"Lipo Papada con Laser 360",
    nameEN:"Chin Lipo 360",
    img:"https://images.unsplash.com/photo-1596815064285-45ed8a9c0463"
  },
  {
    nameES:"Aumento de Senos",
    nameEN:"Breast Enhancement",
    img:"https://images.unsplash.com/photo-1596462502278-27bfdc403348"
  },
  {
    nameES:"Aumento de Glúteos",
    nameEN:"Butt Enhancement",
    img:"https://images.unsplash.com/photo-1615141982883-c7ad0e69fd62"
  },
  {
    nameES:"LipoEscultura de Brazos 360",
    nameEN:"Arm Sculpting 360",
    img:"https://images.unsplash.com/photo-1594737625785-a6cbdabd333c"
  },
  {
    nameES:"LipoEscultura de Piernas 360",
    nameEN:"Leg Sculpting 360",
    img:"https://images.unsplash.com/photo-1596464716127-f2a82984de30"
  },
  {
    nameES:"D-Cool",
    nameEN:"D-Cool",
    img:"https://images.unsplash.com/photo-1556228720-195a672e8a03"
  }
];

const content = document.getElementById("content");
const menu = document.getElementById("menu");

treatments.forEach((t,i)=>{
  const section = document.createElement("div");
  section.className="section";
  section.id="sec"+i;

  section.innerHTML = `
    <h2>${isES ? t.nameES : t.nameEN}</h2>
    <img src="${t.img}">
    <div class="btns">
      <a href="#">${isES?"Aprender más":"Learn more"}</a>
      <a href="#">${isES?"Agendar":"Book now"}</a>
    </div>
  `;

  content.appendChild(section);

  const btn = document.createElement("button");
  btn.innerText = isES ? t.nameES : t.nameEN;
  btn.onclick = ()=>window.scrollTo({top:section.offsetTop,behavior:"smooth"});
  menu.appendChild(btn);
});
</script>

</body>
</html>
