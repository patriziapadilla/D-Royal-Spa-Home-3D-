<!-- SOLO TE PONGO LAS PARTES MODIFICADAS PARA QUE NO ROMPAS NADA -->

<style>
/* 🔥 CAMBIO 1 */
.deck{
  height:100vh;
  display:flex;
  flex-direction:column; /* 👈 vertical */
  overflow-y:auto;
  overflow-x:hidden;
  scroll-snap-type:y mandatory;
  scroll-behavior:smooth;
}

/* 🔥 CAMBIO 2 */
.slide{
  flex:0 0 100vh;
  width:100%;
  height:100vh;
  scroll-snap-align:start;
}
</style>

<script>
/* 🔥 CAMBIO 3 — SCROLL VERTICAL */

function goToSlide(index){
  const deck = document.getElementById('deck');

  deck.scrollTo({
    top: index * window.innerHeight,
    behavior: 'smooth'
  });
}

/* 🔥 CAMBIO 4 — DETECTAR SECCIÓN ACTIVA */

function updateActiveSlide(){
  const deck = document.getElementById('deck');
  const index = Math.round(deck.scrollTop / window.innerHeight);

  document.querySelectorAll('.slide').forEach((s,i)=>{
    s.classList.toggle('active', i === index);
  });
}

document.getElementById('deck').addEventListener('scroll', updateActiveSlide);
</script>
