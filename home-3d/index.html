<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D’Royal Spa · Home 3D</title>
  <style>
    :root{
      --bg:#050505;
      --panel:#0b0b0b;
      --line:rgba(255,255,255,.10);
      --gold:#dcc2a2;
      --cream:#efe2d4;
      --text:#f8efe7;
      --muted:rgba(248,239,231,.78);
      --shadow:0 24px 70px rgba(0,0,0,.34);
      --whatsapp:#25D366;
      --danger:#ffefe3;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:#000;
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
      overflow:hidden;
    }

    a{color:inherit;text-decoration:none}
    button,input,select{font:inherit}
    button{
      border:none;
      background:none;
      color:inherit;
      cursor:pointer;
    }

    .app{
      width:100%;
      height:100vh;
      overflow:hidden;
      background:#000;
      position:relative;
    }

    .topbar{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:50;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      padding:14px 16px;
      background:linear-gradient(180deg, rgba(0,0,0,.65), rgba(0,0,0,.08));
      pointer-events:none;
    }

    .topbar > *{pointer-events:auto}
    .topbar-center{text-align:center;flex:1;min-width:0}

    .brand{
      margin:0;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(22px,2.6vw,34px);
      font-weight:500;
      color:var(--gold);
      letter-spacing:.02em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .deck{
      height:100vh;
      display:flex;
      overflow-x:auto;
      overflow-y:hidden;
      scroll-snap-type:x mandatory;
      scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
    }

    .deck::-webkit-scrollbar{display:none}

    .slide{
      flex:0 0 100vw;
      width:100vw;
      height:100vh;
      scroll-snap-align:start;
      position:relative;
      overflow:hidden;
      background:#000;
    }

    .slide-inner{
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      opacity:.55;
      transform:scale(.94);
      transition:opacity .45s ease, transform .45s ease;
    }

    .slide.active .slide-inner{opacity:1;transform:scale(1)}

    .home-video-wrap{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
    }

    .home-video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:0;
      background:#000;
    }

    .home-overlay{
      position:absolute;
      inset:0;
      z-index:1;
      background:linear-gradient(180deg, rgba(0,0,0,.18) 0%, rgba(0,0,0,.32) 32%, rgba(0,0,0,.70) 76%, rgba(0,0,0,.95) 100%);
    }

    .home-center{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:68px 20px 170px;
      position:relative;
      z-index:2;
    }

    .headline{
      margin:0;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(48px,7vw,92px);
      line-height:.92;
      font-weight:500;
      color:#fff9f1;
      max-width:980px;
    }

    .review-link{
      margin-top:12px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:7px 14px;
      border-radius:999px;
      background:rgba(0,0,0,.32);
      border:1px solid rgba(255,255,255,.10);
      color:#f3ddba;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(15px,1.2vw,21px);
      line-height:1;
    }

    .review-stars{letter-spacing:.06em;font-size:1em}

    .home-tagline{
      margin-top:14px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(18px,2vw,32px);
      color:#fff6eb;
    }

    .areas{
      margin-top:12px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(16px,1.9vw,26px);
      color:#f3e7d8;
    }

    .offer{
      margin-top:12px;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(10,10,10,.34);
      font-size:14px;
    }

    .offer b{
      padding:7px 12px;
      border-radius:999px;
      background:rgba(220,194,162,.18);
      color:#fff4e8;
    }

    .primary-book,
    .secondary-cta,
    .phone-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      border-radius:999px;
      box-shadow:0 10px 26px rgba(0,0,0,.28);
    }

    .primary-book{
      margin-top:14px;
      width:min(440px, 62vw);
      max-width:88vw;
      padding:12px 22px;
      background:linear-gradient(180deg, #e6c98f 0%, #c99d46 100%);
      color:#111;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(18px,1.7vw,28px);
      font-weight:700;
      border:1px solid rgba(255,255,255,.22);
    }

    .secondary-cta{
      margin-top:10px;
      width:min(440px, 62vw);
      max-width:88vw;
      padding:12px 20px;
      background:rgba(0,0,0,.48);
      border:1px solid rgba(255,255,255,.14);
      color:#fff8ef;
      font-size:clamp(16px,1.35vw,24px);
      font-weight:700;
    }

    .phone-link{
      margin-top:10px;
      gap:8px;
      padding:10px 18px;
      background:rgba(0,0,0,.48);
      border:1px solid rgba(255,255,255,.14);
      color:#fff8ef;
      font-size:clamp(16px,1.35vw,24px);
      font-weight:700;
    }

    .phone-icon{font-size:1em;line-height:1}

    .treatments-label{
      margin-top:14px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(18px,1.7vw,30px);
      color:#fff2df;
    }

    .home-tools{
      margin-top:18px;
      width:min(900px, 94vw);
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      position:relative;
      z-index:2;
    }

    .tool-card{
      padding:14px 14px 16px;
      border-radius:22px;
      background:rgba(6,6,6,.58);
      border:1px solid rgba(255,255,255,.10);
      backdrop-filter:blur(6px);
      box-shadow:var(--shadow);
      text-align:left;
    }

    .tool-card h3{
      margin:0 0 8px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:18px;
      color:#fff8ef;
      font-weight:500;
    }

    .tool-card p{
      margin:0 0 12px;
      font-size:14px;
      line-height:1.45;
      color:var(--muted);
    }

    .tool-card button,
    .tool-card a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.05);
      color:#fff8ef;
      font-weight:700;
      width:100%;
    }

    .home-rail{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      z-index:3;
      display:grid;
      gap:1px;
      padding:0 0 4px;
      background:linear-gradient(180deg, transparent, rgba(0,0,0,.76) 24%, rgba(0,0,0,.97) 100%);
    }

    .rail-btn,
    .mini-rail-btn{
      width:100%;
      text-align:left;
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      padding:0 14px;
      background:#030303;
      border-top:1px solid var(--line);
      border-bottom:1px solid var(--line);
      border-left:none;
      border-right:none;
      border-radius:0;
      font-family:Georgia,"Times New Roman",serif;
      color:#fff8ef;
      margin:0;
      min-width:0;
    }

    .rail-btn{height:26px;font-size:clamp(12px,0.96vw,16px);line-height:1}
    .mini-rail-btn{height:26px;font-size:12px;line-height:1}

    .treatment{
      background:radial-gradient(circle at top left, rgba(255,255,255,.04), transparent 24%),linear-gradient(180deg, #080808 0%, #000 100%);
    }

    .treatment-wrap{
      width:100%;
      height:100%;
      padding:88px 16px 72px;
      display:grid;
      grid-template-columns:1.04fr .96fr;
      gap:18px;
      align-items:stretch;
    }

    .media-pane{
      position:relative;
      border-radius:28px;
      overflow:hidden;
      background:#111;
      box-shadow:var(--shadow);
      min-height:0;
    }

    .media-stage{
      width:100%;
      height:100%;
      position:relative;
      background:#0e0e0e;
    }

    .media-stage video,
    .media-stage img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#111;
    }

    .fallback-image{display:none}
    .fallback-image.show{display:block}
    .hidden-video{display:none}
    .info-pane{display:flex;flex-direction:column;min-height:0}

    .page-card{
      flex:1;
      min-height:0;
      border-radius:28px;
      overflow:auto;
      background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.00));
      border:1px solid rgba(255,255,255,.06);
      box-shadow:var(--shadow);
      position:relative;
    }

    .page-card-inner{padding:24px 18px 18px}

    .floating-home{
      position:sticky;
      top:10px;
      z-index:12;
      display:flex;
      justify-content:flex-start;
      margin-bottom:14px;
      pointer-events:none;
    }

    .floating-home .home-link{
      pointer-events:auto;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(0,0,0,.72);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:0 10px 24px rgba(0,0,0,.28);
      color:#fff8ef;
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      backdrop-filter:blur(6px);
    }

    .page-topline{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:10px;
      margin-bottom:12px;
      color:rgba(255,255,255,.82);
    }

    .page-title{
      margin:0 0 12px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(34px,4vw,62px);
      line-height:.94;
      font-weight:500;
      color:#fff8ef;
    }

    .page-text{
      margin:0;
      font-size:clamp(15px,1.12vw,18px);
      line-height:1.55;
      color:var(--muted);
    }

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin:18px 0 16px;
    }

    .chip{
      padding:8px 13px;
      border-radius:999px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.10);
      color:#f5ecdf;
      font-size:13px;
      line-height:1;
    }

    .quick-tools{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin:12px 0 14px;
    }

    .quick-tools button{
      min-height:44px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
      color:#fff8ef;
      font-weight:700;
    }

    .package-box{
      margin:10px 0 16px;
      padding:14px;
      border-radius:20px;
      background:#0b0b0b;
      border:1px solid rgba(255,255,255,.10);
    }

    .package-box h4{
      margin:0 0 10px;
      font-family:Georgia,"Times New Roman",serif;
      font-size:20px;
      font-weight:500;
      color:#fff8ef;
    }

    .calc-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .calc-grid select,
    .calc-grid input{
      width:100%;
      min-height:44px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:#050505;
      color:#fff8ef;
      padding:0 12px;
    }

    .calc-result{
      margin-top:12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 14px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
    }

    .calc-price{
      font-size:24px;
      font-weight:800;
      color:#fff4e8;
    }

    .result-card{
      overflow:hidden;
      background:#0b0b0b;
      border:1px solid rgba(255,255,255,.10);
      border-radius:20px;
      margin-top:4px;
    }

    .result-lab{
      padding:10px 8px;
      text-align:center;
      font-size:12px;
      letter-spacing:.16em;
      text-transform:uppercase;
      background:#000;
      color:#f6ecdf;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .result-card img{
      width:100%;
      height:240px;
      object-fit:cover;
      display:block;
      background:#111;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:18px;
    }

    .btn{
      min-height:48px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      font-size:16px;
      font-weight:800;
      border:1px solid rgba(255,255,255,.14);
      padding:0 14px;
      text-align:center;
    }

    .btn.light{background:transparent;color:#fff}
    .btn.gold{background:var(--cream);color:#111;border-color:transparent}

    .results-note{
      margin-top:10px;
      text-align:center;
      font-size:11px;
      letter-spacing:.04em;
      color:rgba(255,255,255,.62);
    }

    .bottom-nav{margin-top:12px;display:grid;gap:4px}

    .whatsapp-float,
    .quote-float{
      position:fixed;
      right:16px;
      width:56px;
      height:56px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 16px 36px rgba(0,0,0,.35);
      font-size:24px;
      z-index:60;
    }

    .whatsapp-float{
      bottom:16px;
      background:var(--whatsapp);
      color:#fff;
    }

    .quote-float{
      bottom:82px;
      background:#f3dfc4;
      color:#111;
      border:none;
      font-weight:900;
      font-size:22px;
    }

    .sticky-book{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:16px;
      z-index:59;
      min-height:54px;
      padding:0 20px;
      border-radius:999px;
      background:linear-gradient(180deg, #e6c98f 0%, #c99d46 100%);
      color:#111;
      font-weight:900;
      box-shadow:0 16px 36px rgba(0,0,0,.35);
      display:none;
      align-items:center;
      justify-content:center;
      min-width:230px;
    }

    .modal{
      position:fixed;
      inset:0;
      z-index:120;
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      background:rgba(0,0,0,.72);
      backdrop-filter:blur(6px);
    }

    .modal.open{display:flex}

    .modal-card{
      width:min(560px, 100%);
      max-height:90vh;
      overflow:auto;
      background:#090909;
      border:1px solid rgba(255,255,255,.12);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:18px;
    }

    .modal-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }

    .modal-title{
      margin:0;
      font-family:Georgia,"Times New Roman",serif;
      font-size:30px;
      font-weight:500;
      color:#fff8ef;
    }

    .close-btn{
      width:40px;
      height:40px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
      color:#fff8ef;
      font-size:20px;
    }

    .modal-text{
      margin:0 0 16px;
      color:var(--muted);
      line-height:1.5;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .field{display:grid;gap:7px}
    .field.full{grid-column:1 / -1}
    .field label{font-size:13px;color:#f0e0ca}

    .field input,
    .field select,
    .field textarea{
      width:100%;
      min-height:46px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:#040404;
      color:#fff8ef;
      padding:0 12px;
    }

    .field textarea{
      min-height:100px;
      padding:12px;
      resize:vertical;
    }

    .inline-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:16px;
    }

    .primary-modal-btn,
    .secondary-modal-btn{
      min-height:48px;
      border-radius:999px;
      font-weight:900;
      padding:0 14px;
    }

    .primary-modal-btn{
      background:linear-gradient(180deg, #e6c98f 0%, #c99d46 100%);
      color:#111;
    }

    .secondary-modal-btn{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.12);
      color:#fff8ef;
    }

    @media (max-width: 920px){
      .treatment-wrap{
        grid-template-columns:1fr;
        gap:12px;
        padding:82px 12px 92px;
      }

      .media-pane{height:38vh;min-height:300px}
      .result-card img{height:170px}
      .headline{font-size:clamp(40px,10.2vw,66px)}
      .home-center{padding:74px 16px 190px}
      .review-link{font-size:14px;padding:7px 12px;gap:7px;margin-top:10px}
      .home-tagline{margin-top:12px;font-size:clamp(16px,5vw,22px)}
      .areas{margin-top:10px;font-size:clamp(14px,4.8vw,20px)}
      .offer{margin-top:10px;font-size:13px;padding:6px 9px}
      .primary-book,.secondary-cta{width:min(320px, 76vw);font-size:20px;padding:11px 18px;margin-top:12px}
      .phone-link{font-size:17px;padding:10px 16px;margin-top:9px}
      .treatments-label{margin-top:12px;font-size:20px}
      .actions,.quick-tools,.calc-grid,.home-tools,.form-grid,.inline-actions{grid-template-columns:1fr}
      .home-rail{gap:1px;padding:0 0 3px}
      .rail-btn,.mini-rail-btn{height:24px;font-size:11px;padding:0 10px}
      .page-text{font-size:15px;line-height:1.5}
      .floating-home{top:6px;margin-bottom:10px}
      .floating-home .home-link{font-size:11px;padding:9px 12px}
      .sticky-book{display:flex}
      .whatsapp-float{bottom:84px}
      .quote-float{bottom:150px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="topbar-center">
        <h1 class="brand" id="brand"></h1>
      </div>
    </div>

    <main class="deck" id="deck"></main>

    <button class="quote-float" id="quoteFloat" aria-label="Cotización rápida">$</button>
    <a class="whatsapp-float" id="whatsFloat" href="https://wa.me/17866900960" target="_blank" rel="noopener" aria-label="WhatsApp">✆</a>
    <a class="sticky-book" href="https://DRoyalSpaMiami.as.me/" target="_blank" rel="noopener">Book Now</a>
  </div>

  <div class="modal" id="quoteModal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-top">
        <h2 class="modal-title">Quick Quote</h2>
        <button class="close-btn" id="closeModal" aria-label="Cerrar">×</button>
      </div>
      <p class="modal-text">Déjanos tu interés o abre WhatsApp con un mensaje listo. Esto es fase 1: limpio, rápido y pro.</p>

      <form id="quoteForm">
        <div class="form-grid">
          <div class="field">
            <label for="leadName">Name</label>
            <input id="leadName" name="leadName" type="text" placeholder="Your name" />
          </div>

          <div class="field">
            <label for="leadPhone">Phone</label>
            <input id="leadPhone" name="leadPhone" type="tel" placeholder="786-000-0000" />
          </div>

          <div class="field">
            <label for="leadTreatment">Treatment</label>
            <select id="leadTreatment" name="leadTreatment"></select>
          </div>

          <div class="field">
            <label for="leadArea">Area</label>
            <select id="leadArea" name="leadArea">
              <option value="Abdomen">Abdomen</option>
              <option value="Arms">Arms</option>
              <option value="Legs">Legs</option>
              <option value="Waist">Waist</option>
              <option value="Double Chin">Double Chin</option>
              <option value="Face">Face</option>
              <option value="Breasts">Breasts</option>
              <option value="Buttocks">Buttocks</option>
            </select>
          </div>

          <div class="field">
            <label for="leadSessions">Sessions</label>
            <select id="leadSessions" name="leadSessions">
              <option value="3">3 sessions</option>
              <option value="6">6 sessions</option>
              <option value="8">8 sessions</option>
            </select>
          </div>

          <div class="field">

      const name = document.getElementById('leadName').value.trim();
      const phone = document.getElementById('leadPhone').value.trim();
      const treatment = document.getElementById('leadTreatment').value;
      const area = document.getElementById('leadArea').value;
      const sessions = document.getElementById('leadSessions').value;
      const zone = document.getElementById('leadZone').value;
      const notes = document.getElementById('leadNotes').value.trim();

      return [
        'Hola, estoy interesada en saber más sobre este tratamiento.',
        name ? `Name: ${name}` : null,
        phone ? `Phone: ${phone}` : null,
        treatment ? `Treatment: ${treatment}` : null,
        area ? `Area: ${area}` : null,
        sessions ? `Sessions: ${sessions}` : null,
        zone ? `Zone: ${zone}` : null,
        notes ? `Notes: ${notes}` : null

      const msg = buildLeadMessage();
      try {
        await navigator.clipboard.writeText(msg);
        copyLeadBtn.textContent = 'Copied';
        setTimeout(() => copyLeadBtn.textContent = 'Copy Lead', 1400);
      } catch {
        alert(msg);
      }
    });

    function updatePackagePrice(box){
      const index = Number(box.dataset.treatmentIndex);
      const slide = slides[index];
      const sessionValue = Number(box.querySelector('.package-session-select').value);
      const areaValue = Number(box.querySelector('.package-area-select').value);
      const multiplier = sessionValue === 3 ? 1 : sessionValue === 6 ? 1.75 : 2.25;
      const total = Math.round(slide.basePrice * multiplier * areaValue);
      box.querySelector('.calc-price').textContent = `$${total}`;
    }

    document.querySelectorAll('.package-box').forEach(box => {
      updatePackagePrice(box);
      box.querySelectorAll('select').forEach(select => {
        select.addEventListener('change', () => updatePackagePrice(box));
      });
    });

    window.handleVideoError = function(index) {
      const video = document.getElementById(`video-${index}`);
      const fallback = document.getElementById(`fallback-${index}`);
      if (video) video.classList.add('hidden-video');
      if (fallback) fallback.classList.add('show');
    };

    function forcePlayVideos() {
      const videos = document.querySelectorAll('video');
      videos.forEach((video) => {
        video.muted = true;
        video.defaultMuted = true;
        video.setAttribute('muted', '');
        video.setAttribute('autoplay', '');
        video.setAttribute('loop', '');
        video.setAttribute('playsinline', '');
        video.setAttribute('webkit-playsinline', '');
        const p = video.play();
        if (p !== undefined) p.catch(() => {});
      });
    }

    const slideEls = [...document.querySelectorAll('.slide')];

    function setActiveSlide() {
      const left = deck.scrollLeft;
      const width = deck.clientWidth;
      const active = Math.round(left / width);
      slideEls.forEach((el, i) => el.classList.toggle('active', i === active));
      forcePlayVideos();
    }

    function goToSlide(index) {
      deck.scrollTo({ left: index * deck.clientWidth, behavior: 'smooth' });
      setTimeout(forcePlayVideos, 250);
    }

    document.addEventListener('click', (e) => {
      const go = e.target.closest('[data-go]');
      if (go) goToSlide(Number(go.dataset.go));

      const goTreatment = e.target.closest('.go-treatment');
      if (goTreatment) goToSlide(Number(goTreatment.dataset.go));

      const openTreatmentQuote = e.target.closest('.open-treatment-quote');
      if (openTreatmentQuote) openModal(Number(openTreatmentQuote.dataset.treatmentIndex));

      if (e.target.closest('.open-quote-modal')) openModal();

      const scrollToPackage = e.target.closest('.scroll-to-package');
      if (scrollToPackage) {
        const index = Number(scrollToPackage.dataset.treatmentIndex);
        const box = document.querySelector(`.package-box[data-treatment-index="${index}"]`);
        if (box) box.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    });

    deck.addEventListener('scroll', setActiveSlide);
    window.addEventListener('resize', () => { setActiveSlide(); forcePlayVideos(); });

    deck.addEventListener('wheel', (e) => {
      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
        e.preventDefault();
        deck.scrollLeft += e.deltaY;
      }
    }, { passive:false });

    document.addEventListener('DOMContentLoaded', forcePlayVideos);
    window.addEventListener('load', forcePlayVideos);
    document.addEventListener('visibilitychange', () => { if (!document.hidden) forcePlayVideos(); });
    document.addEventListener('touchstart', forcePlayVideos, { passive: true });
    document.addEventListener('touchend', forcePlayVideos, { passive: true });

    setActiveSlide();
    forcePlayVideos();
